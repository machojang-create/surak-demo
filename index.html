function _geocodeAll(cb){
  var cached=localStorage.getItem('surak_coords_v3');
  if(cached){
    try{
      JSON.parse(cached).forEach(function(d){
        var s=STORES.find(function(x){return x.id===d.id;});
        if(s){s.lat=d.lat;s.lng=d.lng;}
      });
      cb();return;
    }catch(e){}
  }
  var results=[],i=0;
  function next(){
    if(i>=_ADDRS.length){
      localStorage.setItem('surak_coords_v3',JSON.stringify(results));
      results.forEach(function(d){
        var s=STORES.find(function(x){return x.id===d.id;});
        if(s){s.lat=d.lat;s.lng=d.lng;}
      });
      cb();return;
    }
    var item=_ADDRS[i++];
    fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(item.addr),
      {headers:{'Authorization':'KakaoAK 85c21d02aaa343135c829998e04b8d83'}})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.documents&&data.documents[0]){
        var d=data.documents[0];
        results.push({id:item.id,lat:parseFloat(d.y),lng:parseFloat(d.x)});
      }
      setTimeout(next,80);
    })
    .catch(function(){setTimeout(next,80);});
  }
  next();
}

function initMapEvents(){
  var el=document.getElementById('leaflet-map');
  if(!el||window._lmap)return;
  if(typeof L==='undefined'){setTimeout(initMapEvents,200);return;}
  window._lmap=L.map('leaflet-map',{center:[37.6578,127.0618],zoom:18,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(window._lmap);
  setTimeout(function(){
    window._lmap.invalidateSize();
    _geocodeAll(function(){renderPins();});
  },400);
}
