<html lang="ko">
<head>
<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nanum Gothic',sans-serif}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#fff}
#nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #eee;flex-shrink:0}
#nav-title{font-size:15px;font-weight:800;color:#222}
#nav-sub{font-size:10px;color:#999;letter-spacing:.5px}
#vtabs{display:flex;border-bottom:1px solid #eee;flex-shrink:0}
.vtab{flex:1;padding:8px 0;text-align:center;font-size:11px;color:#aaa;cursor:pointer;border:none;background:#fff;border-bottom:2px solid transparent}
.vtab.on{color:#2A6E4E;border-bottom:2px solid #2A6E4E;font-weight:700}
.vtab-ic{display:block;font-size:18px;margin-bottom:1px}
#views{flex:1;overflow:hidden;position:relative;min-height:0}
.view{display:none;position:absolute;top:0;left:0;right:0;bottom:0;flex-direction:column;overflow:hidden}
.view.on{display:flex}
#map-filter-bar{flex-shrink:0;display:flex;gap:6px;padding:8px 10px;overflow-x:auto;background:#fff;border-bottom:1px solid #f0f0f0}
#map-filter-bar::-webkit-scrollbar{display:none}
.fcat{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;white-space:nowrap;cursor:pointer;color:#555}
.fcat.on{background:#2A6E4E;color:#fff;border-color:#2A6E4E}
#map-wrap{flex:1;position:relative;min-height:0}
#naver-map{width:100%;height:100%;min-height:300px}
#map-status{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;font-size:12px;padding:6px 16px;border-radius:20px;z-index:100;white-space:nowrap;pointer-events:none;transition:opacity .5s}
#list-filter-bar{flex-shrink:0;display:flex;gap:6px;padding:8px 10px;overflow-x:auto;background:#fff;border-bottom:1px solid #f0f0f0}
#list-filter-bar::-webkit-scrollbar{display:none}
#list-items{flex:1;overflow-y:auto;padding:8px 14px 70px}
#pop-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:flex-end;justify-content:center}
#pop-ov.on{display:flex}
#pop-sheet{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px 34px;max-height:80vh;overflow-y:auto;position:relative}
#pop-x{position:absolute;top:14px;right:16px;font-size:20px;background:none;border:none;cursor:pointer;color:#bbb}
.pop-bar{width:36px;height:4px;background:#eee;border-radius:2px;margin:0 auto 18px}
.pop-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;color:#fff;margin-bottom:10px}
.pop-name{font-size:18px;font-weight:800;color:#222;margin-bottom:4px}
.pop-addr{font-size:12px;color:#aaa;margin-bottom:6px}
.pop-desc{font-size:13px;color:#555;margin-bottom:12px;line-height:1.6}
.pop-menus{display:flex;flex-direction:column;gap:0}
.pop-menu-row{display:flex;justify-content:space-between;font-size:13px;color:#444;padding:7px 0;border-bottom:1px solid #f5f5f5}

.view-scroll{flex:1;overflow-y:auto;padding:12px 14px 70px}
.wd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.wd-item{background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #eee}
.wd-lbl{font-size:10px;color:#999;display:block}
.wd-val{font-size:14px;font-weight:700;color:#222;display:block;margin-top:2px}
.mt-card{background:#f8f9f8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.mt-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mt-ic{font-size:26px}
.mt-name{font-size:14px;font-weight:700;color:#222}
.mt-region{font-size:11px;color:#999;margin-top:2px}
.mt-desc{font-size:12px;color:#555;line-height:1.7;margin-bottom:8px}
.mt-tags{display:flex;flex-wrap:wrap;gap:5px}
.mt-tag{background:#e8f5ee;color:#2A6E4E;font-size:11px;padding:3px 8px;border-radius:20px}
.t-card{background:#f8f9f8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.t-bar{height:4px;border-radius:2px;margin-bottom:10px}
.t-body{padding:0}
.t-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.t-name{font-size:14px;font-weight:700;color:#222}
.t-lv{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.t-row2{display:flex;gap:8px;margin-bottom:6px}
.t-stat{font-size:11px;color:#888}
.t-route{font-size:12px;color:#555;margin-bottom:4px;line-height:1.6}
.t-gds{font-size:12px;color:#2A6E4E;font-weight:700}
.hw-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0}
.hw-num{width:26px;height:26px;border-radius:50%;background:#2A6E4E;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.hw-t{font-size:13px;font-weight:700;color:#222;margin-bottom:2px}
.hw-d{font-size:12px;color:#888}
.goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0}
.goods-item{background:#f8f9f8;border-radius:12px;padding:14px;text-align:center}
.goods-ic{font-size:28px;margin-bottom:6px}
.goods-name{font-size:13px;font-weight:700;color:#222}
.goods-sub{font-size:11px;color:#888;margin-top:2px}
.sp-card{background:#f8f9f8;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.sp-ic{font-size:22px;flex-shrink:0;margin-top:2px}
.sp-name{font-size:13px;font-weight:700;color:#222}
.sp-desc{font-size:11px;color:#999;margin-top:2px}
.sp-goods{font-size:11px;color:#2A6E4E;margin-top:3px;font-weight:700}
.ds-tag{display:inline-block;background:#e8f5ee;color:#2A6E4E;font-size:11px;padding:3px 9px;border-radius:20px;margin:3px 2px}
.rc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;padding:4px 0}
.rc-ic{font-size:22px}
.rc-t{font-size:12px;font-weight:700;color:#222;margin-top:4px}
.rc-d{font-size:11px;color:#999;margin-top:2px}
.info-card{background:#f8f9f8;border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:13px;color:#444;line-height:1.8}
.sec-tit{font-size:15px;font-weight:700;color:#222;margin:16px 0 8px}
.sec-tit:first-child{margin-top:0}
.l-card{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.l-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.l-name{font-size:14px;font-weight:700;color:#222}
.l-sub{font-size:11px;color:#aaa;margin-top:2px}

</style>
</head>

  });
  _buildMapFilter();
  _geocodeAll();
}

function _geocodeAll(){
  // localStorage 캐시 확인
  var cached=localStorage.getItem('surak_coords_v5');
  if(cached){
    try{
      JSON.parse(cached).forEach(function(d){
        var s=STORES.find(function(x){return x.id===d.id;});
        if(s){s.lat=d.lat;s.lng=d.lng;}
      });
      STORES.forEach(function(s){if(s.lat&&s.lng)_placeMarker(s);});
      _fitAll();
      var st=document.getElementById('map-status');
      if(st){st.textContent='✅ '+STORES.length+'개 매장';setTimeout(function(){st.style.opacity='0';},2000);}
      return;
    }catch(e){}
  }
  // 신규 변환
  var st=document.getElementById('map-status');
  _done=0;
  var cache={},results=[];
  STORES.forEach(function(s,i){
    setTimeout(function(){
      naver.maps.Service.geocode({query:s.addr},function(status,res){
        if(status===naver.maps.Service.Status.OK&&res.v2.addresses.length>0){
          var r=res.v2.addresses[0];
          var key=r.y+'_'+r.x;
          if(!cache[key])cache[key]=0;
          var n=cache[key]++;
          var ang=n*(Math.PI*2/8),dist=n>0?0.00008:0;
          s.lat=parseFloat(r.y)+dist*Math.cos(ang);
          s.lng=parseFloat(r.x)+dist*Math.sin(ang);
          results.push({id:s.id,lat:s.lat,lng:s.lng});
          if(_curFilter==='all'||s.cat===_curFilter) _placeMarker(s);
        }
        _done++;
        if(st) st.textContent='🔄 주소 변환 중... '+_done+'/'+STORES.length;
        if(_done===STORES.length){
          localStorage.setItem('surak_coords_v5',JSON.stringify(results));
          _fitAll();
          if(st){st.textContent='✅ '+STORES.length+'개 매장';setTimeout(function(){st.style.opacity='0';},2000);}
        }
      });
    },i*120);
  });
}

function _placeMarker(s){
  var cat=CATS[s.cat]||CATS.food;
  var m=new naver.maps.Marker({
    position:new naver.maps.LatLng(s.lat,s.lng),map:_map,
    icon:{
      content:'<div style="cursor:pointer;width:30px;height:30px;background:'+cat.color+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)"><span style="transform:rotate(45deg);font-size:13px;line-height:1">'+cat.icon+'</span></div>',
      anchor:new naver.maps.Point(15,30)
    },title:s.ko
  });
  naver.maps.Event.addListener(m,'click',function(){
    _iw.setContent('<div style="padding:10px 14px;min-width:180px"><b style="font-size:14px;color:#222">'+s.ko+'</b><br><span style="font-size:11px;color:#999">'+s.addr+'</span><br><span style="font-size:11px;background:'+cat.color+';color:#fff;padding:2px 8px;border-radius:4px;margin-top:6px;display:inline-block">'+cat.icon+' '+cat.label+'</span></div>');
    _iw.open(_map,m);
  });
  s._marker=m; _markers.push(m);
}

function _fitAll(){
  var pts=STORES.filter(function(s){return s.lat&&s.lng;});
  if(!pts.length)return;
  var lats=pts.map(function(s){return s.lat;}),lngs=pts.map(function(s){return s.lng;});
  _map.fitBounds(new naver.maps.LatLngBounds(
    new naver.maps.LatLng(Math.min.apply(null,lats),Math.min.apply(null,lngs)),
    new naver.maps.LatLng(Math.max.apply(null,lats),Math.max.apply(null,lngs))
  ),{top:50,right:30,bottom:50,left:30});
}

function _renderMarkers(){
  _markers.forEach(function(m){m.setMap(null);}); _markers=[];
  gfStore().forEach(function(s){if(s.lat&&s.lng)_placeMarker(s);});
}

function _buildMapFilter(){
  var bar=document.getElementById('map-filter-bar'); bar.innerHTML='';
  function btn(k,label){
    var b=document.createElement('button');
    b.className='fcat'+(k===_curFilter?' on':'');
    b.textContent=label;
    b.onclick=function(){_curFilter=k;_buildMapFilter();_renderMarkers();};
    bar.appendChild(b);
  }
  btn('all','전체 '+STORES.length);
  Object.keys(CATS).forEach(function(k){
    var cnt=STORES.filter(function(s){return s.cat===k;}).length;
    if(cnt>0) btn(k,CATS[k].icon+' '+CATS[k].label+' '+cnt);
  });
}

// ── 매장 탭 ──
function buildFilter(barId,cb){
  var bar=g(barId);if(!bar)return;
  bar.innerHTML='';
  ['all'].concat(GCATS.filter(function(x){return x!=='all';})).forEach(function(k){
    var cnt=k==='all'?STORES.length:STORES.filter(function(s){return gk(s)===k;}).length;
    var btn=mk('button','fcat'+(curGf===k?' on':''));
    btn.innerHTML=(GICONS[k]||'🏔️')+' '+T(k)+'<small style="margin-left:3px;opacity:.7">'+cnt+'</small>';
    btn.addEventListener('click',function(){curGf=k;cb();});
    btn.addEventListener('touchend',function(e){e.preventDefault();curGf=k;cb();});
    bar.appendChild(btn);
  });
}

// ── 팝업 ──
function openPopup(s){
  actS=s;var ov=g('pop-ov');if(!ov)return;
  var k=gk(s);
  // 팝업 타이틀 영역 (컬러바 아래)
  var titleBar=g('pop-title-bar');
  if(titleBar){
    titleBar.innerHTML='';
    titleBar.style.cssText='display:flex;align-items:center;gap:10px;padding:14px 16px 0;';
    var bigIc=mk('div');bigIc.textContent=CATICON[s.cat];
    bigIc.style.cssText='font-size:34px;flex-shrink:0;line-height:1';
    titleBar.appendChild(bigIc);
    var titleRight=mk('div');titleRight.style.cssText='flex:1;min-width:0';
    var nameEl=mk('div');nameEl.textContent=sN(s);
    nameEl.style.cssText='font-size:18px;font-weight:800;color:#1A3020;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px';
    titleRight.appendChild(nameEl);
    var badgeRow=mk('div');badgeRow.style.cssText='display:flex;gap:5px;flex-wrap:wrap;align-items:center';
    var cb=mk('span');cb.textContent=T(s.cat);
    cb.style.cssText='font-size:11px;padding:2px 8px;border-radius:10px;background:'+s.color+'22;color:'+s.color+';font-weight:700;border:1px solid '+s.color+'44';
    badgeRow.appendChild(cb);
    var sb=mk('span');sb.textContent=s.open?T('open'):T('closed');
    sb.style.cssText='font-size:11px;padding:2px 8px;border-radius:10px;background:'+(s.open?'rgba(42,138,80,.1)':'rgba(212,58,42,.1)')+';color:'+(s.open?'#2A8A50':'#D43A2A');
    badgeRow.appendChild(sb);
    var gb=mk('span');gb.textContent=GICONS[k]+' '+T(k);
    gb.style.cssText='font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(61,107,79,.08);color:#3D6B4F;font-weight:700';
    badgeRow.appendChild(gb);
    titleRight.appendChild(badgeRow);
    titleBar.appendChild(titleRight);
  }
  // 기존 pop-hdr 숨김
  var hdrEl=g('pop-hdr');if(hdrEl)hdrEl.style.display='none';
  se('pop-likes','❤️ '+fL(s.likes)+' '+(T('likes')||T('likes')));
  se('pop-desc',sD(s));
  se('pop-dist',T('dist3exit')+(s.dist||0)+'m');
  var bar=g('pop-bar');if(bar)bar.style.background=s.color;
  se('pop-menu-lbl','🍽️ '+T('tlist'));
  var ml=g('pop-menus');if(ml){
    ml.innerHTML='';
    s.menus.forEach(function(m){
      var row=mk('div','pm-row');
      var n=mk('span','pm-n');n.textContent=mN(m);row.appendChild(n);
      var p=mk('span','pm-p');p.textContent=m.price?m.price.toLocaleString()+T('won'):'';row.appendChild(p);
      ml.appendChild(row);
    });
  }
  se('pop-gtit',T('popGoodsTit'));
  se('pop-gcert',T('pcert')||T('popCertDesc'));
  var gi=g('pop-gitem');if(gi){
    gi.innerHTML='';
    var pill=mk('button','gpill'+(myGoods[k]?' have':''));
    pill.textContent=GICONS[k]+' '+T(k)+(myGoods[k]?' ✓':'');
    (function(key){
      pill.addEventListener('click',function(){
        if(!anyCert()&&!myGoods[key]){pill.textContent=T('certFirst');setTimeout(function(){pill.textContent=GICONS[key]+' '+T(key);},2000);return;}
        myGoods[key]=!myGoods[key];renderGoods();openPopup(s);
      });
    })(k);
    gi.appendChild(pill);
  }
  var cta=g('pop-cta');
  if(cta){cta.style.display='block';cta.style.background=s.color;
    se('pop-cta-txt','🗺️ '+T('dir'));
    cta.onclick=function(){window.open('https://map.kakao.com/link/to/'+encodeURIComponent(sN(s))+','+s.lat+','+s.lng);};
  }
  ov.style.display='flex';
  if(curV==='map')renderPins();
}
function closePopup(){
  var ov=g('pop-ov');if(ov)ov.style.display='none';
  actS=null;if(curV==='map')renderPins();
}

// ── 탭 전환 ──
function sv(v){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.vtab').forEach(function(b){b.classList.remove('on');});
  document.getElementById(v+'-view').classList.add('on');
  document.querySelector('[data-v="'+v+'"]').classList.add('on');
  if(v==='map'){
    if(_mapReady&&!_map) _initMap();
    else if(_map) setTimeout(function(){naver.maps.Event.trigger(_map,'resize');},150);
  }
  if(v==='list'){ buildFilter('list-filter-bar',function(){renderList();}); renderList(); }
  if(v==='goods') renderGoods();
  if(v==='trail') renderTrail();
  if(v==='info')  renderInfo();
}

// ── 이벤트 ──
document.querySelectorAll('.vtab').forEach(function(b){
  b.addEventListener('click',function(){sv(this.dataset.v);});
});
document.getElementById('lang-btn').addEventListener('change',function(){
  lang=this.value; applyT(); sv('map');
});
document.getElementById('pop-x').onclick=closePopup;
document.getElementById('pop-ov').onclick=function(e){if(e.target===this)closePopup();};

// ── 시작 ──
applyT();
