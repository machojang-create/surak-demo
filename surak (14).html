// ── 유틸 ──
function g(id){return _G[id]!==undefined?_G[id]:(_G[id]=document.getElementById(id));}
function se(id,v){var e=g(id);if(e)e.textContent=v;}
function sh(id,v){var e=g(id);if(e)e.innerHTML=v;}
function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function T(k){var t=LANGS[lang]||LANGS.KO;return t[k]||LANGS.KO[k]||k;}
function sN(s){return(lang==='EN'&&s.en)||(lang==='JP'&&s.jp)||(lang==='CN'&&s.cn)||s.ko;}
function mN(m){return(lang==='EN'&&m.en)||(lang==='JP'&&m.jp)||(lang==='CN'&&m.cn)||m.ko||'';}
function sD(s){return(lang==='EN'&&s.den)||(lang==='JP'&&s.djp)||(lang==='CN'&&s.dcn)||s.dko||'';}
function gk(s){return CAT_GOODS[s.cat]||'keyring';}
function fL(n){if(!n)return'0';return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n);}
function anyCert(){return Object.keys(cert).some(function(k){return cert[k];});}
function gfStore(){
  return STORES.filter(function(s){return curGf==='all'||gk(s)===curGf;})
    .sort(function(a,b){return(a.dist||0)-(b.dist||0);});
}

// ── 날씨 ──
function getWD(code){ var m=WD_MAP[lang]||WD_MAP.KO; for(var k in m)if(parseInt(k)===code)return m[k]; return ''; }
function applyWeather(code,temp,feels,hum,wind,sunset){
  lastWCode=code;
  var icon=WI[code]||'🌤️', desc=getWD(code);
  se('wd-icon',icon);
  se('wd-temp',temp+'°C');
  se('wd-feels',(T('feels')||'체감')+' '+feels+'°C');
  se('wd-desc',desc);
  se('wd-hum',hum+'%');
  se('wd-wind',wind+'m/s');
  se('wd-sunset',sunset);
  var good=code<30&&wind<10;
  se('wd-hiking', good?T('hikingGood'):T('hikingBad'));
  var hkEl=g('wd-hiking'); if(hkEl) hkEl.style.color=good?'#2A5038':'#C05000';
  // 라벨도 현재 언어로
  if(g('wd-lbl-sunset')) g('wd-lbl-sunset').textContent=T('wdSunset')||'🌄 일몰';
  if(g('wd-lbl-hiking')) g('wd-lbl-hiking').textContent=T('wdHiking')||'등산 추천';
}
function loadWeather(){
  var mo=new Date().getMonth();
  var sb=mo<=1||mo===11?{t:-2,r:70,w:3,codes:[0,1,2,71]}
         :mo<=4?{t:14,r:60,w:4,codes:[0,1,2,3,61]}
         :mo<=8?{t:27,r:80,w:3,codes:[0,1,2,61,80]}
               :{t:13,r:65,w:5,codes:[0,1,2,3]};
  var code=sb.codes[Math.floor(Math.random()*sb.codes.length)];
  var temp=sb.t+Math.round((Math.random()-.5)*6);
  var feels=temp-Math.round(Math.random()*4+1);
  var hum=Math.max(30,Math.min(99,sb.r+Math.round((Math.random()-.5)*20)));
  var wind=+(sb.w+(Math.random()-.5)*2).toFixed(1);
  var sunH=(mo>=3&&mo<=8)?19:17;
  var sunset=sunH+':'+(Math.floor(Math.random()*30)+10);
  applyWeather(code,temp,feels,hum,wind,sunset);
  fetch('https://api.open-meteo.com/v1/forecast?latitude=37.6543&longitude=127.0653&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code&daily=sunset&timezone=Asia%2FSeoul&forecast_days=1')
    .then(function(r){return r.json();})
    .then(function(d){
      var c=d.current, ss=d.daily&&d.daily.sunset?d.daily.sunset[0].slice(11,16):sunset;
      applyWeather(c.weather_code,Math.round(c.temperature_2m),Math.round(c.apparent_temperature),c.relative_humidity_2m,Math.round(c.wind_speed_10m*10)/10,ss);
    }).catch(function(){});
}

// ── 지도 ──
function applyM(){
  var c=g('map-canvas');if(!c)return;
  c.style.transform='translate('+Math.round(M.x)+'px,'+Math.round(M.y)+'px) scale('+M.s+')';
  var sl=g('scale-lbl');if(sl)sl.textContent=Math.round(200/M.s)+'m';
}
function clampM(){
  var st=g('map-stage');if(!st)return;
  var sw=st.offsetWidth,sh=st.offsetHeight;
  M.min=Math.max(sw/SVG_W,sh/SVG_H,.35);
  if(M.s<M.min)M.s=M.min;
  var mw=SVG_W*M.s,mh=SVG_H*M.s;
  M.x=mw>=sw?Math.min(0,Math.max(sw-mw,M.x)):(sw-mw)/2;
  M.y=mh>=sh?Math.min(0,Math.max(sh-mh,M.y)):(sh-mh)/2;
}
function doZoom(d,cx,cy){
  var ns=Math.min(M.max,Math.max(M.min,M.s*d));
  var r=ns/M.s;M.x=cx-(cx-M.x)*r;M.y=cy-(cy-M.y)*r;M.s=ns;
  clampM();applyM();renderPins();
}
function renderPins(){
  var pl=g('pins-layer');if(!pl)return;
  pl.innerHTML='';
  gfStore().forEach(function(s){
    if(s.mx==null)return;
    var pin=mk('div','mpin'+(actS&&actS.id===s.id?' sel':''));
    pin.style.left=Math.round(SVG_W*(s.mx/100))+'px';
    pin.style.top=Math.round(SVG_H*(s.my/100))+'px';
    pin.style.transform='translate(-50%,-100%) scale('+(1/M.s)+')';
    pin.style.transformOrigin='50% 100%';
    var dot=mk('div','mpin-dot');dot.style.background=s.color;
    var ic=mk('span','mpin-ic');ic.textContent=CATICON[s.cat]||'🏪';dot.appendChild(ic);
    pin.appendChild(dot);
    var lbl=mk('div','mpin-lbl');lbl.textContent=sN(s);pin.appendChild(lbl);
    (function(store){
      pin.addEventListener('click',function(e){e.stopPropagation();openPopup(store);});
      pin.addEventListener('touchend',function(e){e.stopPropagation();e.preventDefault();openPopup(store);});
    })(s);
    pl.appendChild(pin);
  });
}

function initMapEvents(){
  var st=g('map-stage');if(!st)return;
  st.addEventListener('mousedown',function(e){
    if(e.target.closest('.mpin'))return;
    M.drag=true;M.lx=e.clientX;M.ly=e.clientY;st.style.cursor='grabbing';e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!M.drag)return;
    M.x+=e.clientX-M.lx;M.y+=e.clientY-M.ly;M.lx=e.clientX;M.ly=e.clientY;clampM();applyM();
  });
  document.addEventListener('mouseup',function(){M.drag=false;var s=g('map-stage');if(s)s.style.cursor='grab';});
  st.addEventListener('touchstart',function(e){
    if(e.target.closest('.mpin'))return;
    if(e.touches.length===1){M.lx=e.touches[0].clientX;M.ly=e.touches[0].clientY;}
    else if(e.touches.length===2)M.pd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    e.preventDefault();
  },{passive:false});
  st.addEventListener('touchmove',function(e){
    if(e.target.closest('.mpin'))return;
    if(e.touches.length===1&&!M.pd){
      M.x+=e.touches[0].clientX-M.lx;M.y+=e.touches[0].clientY-M.ly;
      M.lx=e.touches[0].clientX;M.ly=e.touches[0].clientY;clampM();applyM();
    }else if(e.touches.length===2){
      var nd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      if(M.pd){var r=st.getBoundingClientRect();doZoom(nd/M.pd,(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,(e.touches[0].clientY+e.touches[1].clientY)/2-r.top);}
      M.pd=nd;
    }
    e.preventDefault();
  },{passive:false});
  st.addEventListener('touchend',function(){M.pd=0;},{passive:false});
  st.addEventListener('wheel',function(e){
    e.preventDefault();var r=st.getBoundingClientRect();
    doZoom(e.deltaY<0?1.2:1/1.2,e.clientX-r.left,e.clientY-r.top);
  },{passive:false});
  var zi=g('btn-zin'),zo=g('btn-zout');
  if(zi)zi.addEventListener('click',function(){var s=g('map-stage');doZoom(1.5,s.offsetWidth/2,s.offsetHeight/2);});
  if(zo)zo.addEventListener('click',function(){var s=g('map-stage');doZoom(1/1.5,s.offsetWidth/2,s.offsetHeight/2);});
}

// ── 시작 ──
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.vtab').forEach(function(btn){
    btn.addEventListener('click',function(){sv(this.dataset.v);});
    btn.addEventListener('touchend',function(e){e.preventDefault();sv(this.dataset.v);});
  });
  var lb=g('lang-btn');
  if(lb)lb.addEventListener('change',function(){lang=this.value;applyT();sv(curV);});
  var px=g('pop-x');if(px)px.addEventListener('click',closePopup);
  var pov=g('pop-ov');if(pov)pov.addEventListener('click',function(e){if(e.target===pov)closePopup();});
  initMapEvents();
  sv('map');
});

})();
</script>
